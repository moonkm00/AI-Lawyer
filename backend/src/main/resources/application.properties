spring.application.name=backend

# ----------------------------------------------------
# Supabase (PostgreSQL) Database Configuration
# ----------------------------------------------------
spring.datasource.url=${DB_URL}?prepareThreshold=0
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ----------------------------------------------------
# JPA / Hibernate 설정
# ----------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ----------------------------------------------------
# Google AI Studio (Gemini) Configuration
# ----------------------------------------------------
google.ai.api.key=${GOOGLE_AI_API_KEY}
groq.api.key=${GROQ_API_KEY:}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1}

# ----------------------------------------------------
# Multipart 파일 처리 설정 (에러 해결용)
# ----------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.resolve-lazily=true

# Logging to file for debugging
# logging.level.org.springframework.web=ERROR
# logging.level.root=WARN
# logging.level.com.ailawyer=INFO
# logging.file.name=server_debug.log

logging.level.dev.langchain4j=DEBUG